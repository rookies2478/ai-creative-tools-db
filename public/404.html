<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex" />
    <title>ページが見つかりません | Y Labo</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #fff; color: #1e293b; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 2rem; }
      .container { text-align: center; max-width: 480px; }
      .code { font-size: 5rem; font-weight: 900; color: #0066FF; line-height: 1; }
      h1 { margin-top: 1rem; font-size: 1.25rem; font-weight: 700; color: #002B61; }
      p { margin-top: 0.75rem; font-size: 0.875rem; color: #64748b; line-height: 1.6; }
      .btn { display: inline-block; margin-top: 2rem; padding: 0.625rem 1.5rem; background: #0066FF; color: #fff; font-size: 0.875rem; font-weight: 600; border-radius: 0.5rem; text-decoration: none; }
      .btn:hover { background: #0052cc; }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="code">404</div>
      <h1>ページが見つかりません</h1>
      <p>お探しのページは移動または削除された可能性があります。<br>URLをご確認のうえ、トップページからお探しください。</p>
      <a href="/" class="btn">トップページへ戻る</a>
    </div>
  </body>
</html>
